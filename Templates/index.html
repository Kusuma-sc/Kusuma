<!DOCTYPE html>
<html>
<head>
<title>Inbox</title>
<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 20px;
}

.mail {
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>📥 Inbox</h2>

{% for email in emails %}
<div class="mail">
    <p><b>From:</b> {{email[1]}}</p>
    <p><b>Subject:</b> {{email[3]}}</p>
    <p><b>Message:</b> {{email[4]}}</p>
</div>
{% endfor %}

</body>
</html>
