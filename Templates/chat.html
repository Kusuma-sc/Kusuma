<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
</head>
<body>

<h3>{{email}}</h3>

<input id="target" placeholder="Enter email to call">
<button onclick="callUser()">Call</button>

<h3 id="status"></h3>

<script>
    const socket = io();

// ✅ REGISTER USER AFTER LOAD
socket.on("connect", () => {
    socket.emit("register", {
        email: "{{email}}"
    });
});
const socket = io();
let pc;
let localStream;

// STUN server (important for internet call)
const servers = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

// CALL USER
function callUser() {
    const target = document.getElementById("target").value;

    socket.emit("call_user", {
        from: "{{email}}",
        target: target
    });

    document.getElementById("status").innerText = "Calling...";
}

// RECEIVE CALL
socket.on("incoming_call", async (data) => {
    document.getElementById("status").innerText =
        "Incoming call from " + data.from;

    startCall(data.from);
});

// START CALL
async function startCall(target) {
    pc = new RTCPeerConnection(servers);

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.onicecandidate = event => {
        if (event.candidate) {
            socket.emit("ice_candidate", {
                to: target,
                candidate: event.candidate
            });
        }
    };

    pc.ontrack = event => {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.play();
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("webrtc_offer", {
        to: target,
        offer: offer
    });
}

// RECEIVE OFFER
socket.on("webrtc_offer", async (data) => {
    await startAnswer(data.from, data.offer);
});

// ANSWER
async function startAnswer(target, offer) {
    pc = new RTCPeerConnection(servers);

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.onicecandidate = event => {
        if (event.candidate) {
            socket.emit("ice_candidate", {
                to: target,
                candidate: event.candidate
            });
        }
    };

    pc.ontrack = event => {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.play();
    };

    await pc.setRemoteDescription(new RTCSessionDescription(offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("webrtc_answer", {
        to: target,
        answer: answer
    });
}

// RECEIVE ANSWER
socket.on("webrtc_answer", async (data) => {
    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
});

// RECEIVE ICE
socket.on("ice_candidate", async (data) => {
    try {
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    } catch (e) {
        console.error(e);
    }
});
</script>

</body>
</html>
